# SPDX-License-Identifier: Apache-2.0
{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-cpcf-migration-{{ .Release.Revision }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: {app.kubernetes.io/name: cpcf-migration}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-cpcf-migration
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 65532, fsGroup: 65532}
      containers:
        - name: migration
          image: "{{ .Values.image.migration.repository }}@{{ required "Migration image digest is required" .Values.image.migration.digest }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: CPCF_DATABASE_URL
              valueFrom: {secretKeyRef: {name: {{ .Values.migration.secretName }}, key: database-owner-url}}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
            seccompProfile: {type: RuntimeDefault}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
{{- end }}
