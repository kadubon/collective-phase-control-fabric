name: Security analysis

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@961680e5305a30eb575f3ddf6bb6b2e265b68f0a
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_SUMMARY: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          persist-credentials: false
      - uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: p/python

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8096e4f9571939c23cbd19018c44c665f90096af
        with:
          languages: python
          build-mode: none
      - uses: github/codeql-action/analyze@8096e4f9571939c23cbd19018c44c665f90096af

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          persist-credentials: false
      - uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@8096e4f9571939c23cbd19018c44c665f90096af
        if: ${{ always() && hashFiles('trivy-api-image.sarif') != '' }}
        with:
          sarif_file: trivy-results.sarif

  trivy-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          persist-credentials: false
      - name: Build pinned API and worker images
        run: |
          docker build --target api -f deploy/Dockerfile.api -t cpcf-api:${{ github.sha }} .
          docker build --target worker -f deploy/Dockerfile.worker -t cpcf-worker:${{ github.sha }} .
      - id: api-image-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
        with:
          image-ref: cpcf-api:${{ github.sha }}
          format: sarif
          output: trivy-api-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - id: worker-image-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
        with:
          image-ref: cpcf-worker:${{ github.sha }}
          format: sarif
          output: trivy-worker-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@8096e4f9571939c23cbd19018c44c665f90096af
        if: ${{ always() && hashFiles('trivy-worker-image.sarif') != '' }}
        with:
          sarif_file: trivy-api-image.sarif
          category: trivy-api-image
      - uses: github/codeql-action/upload-sarif@8096e4f9571939c23cbd19018c44c665f90096af
        if: always()
        with:
          sarif_file: trivy-worker-image.sarif
          category: trivy-worker-image
      - name: Enforce both image scans
        if: always()
        env:
          API_SCAN: ${{ steps.api-image-scan.outcome }}
          WORKER_SCAN: ${{ steps.worker-image-scan.outcome }}
        run: test "$API_SCAN" = success && test "$WORKER_SCAN" = success
